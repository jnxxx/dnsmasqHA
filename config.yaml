---
version: 2.0.0
#slug: dnsmasq
slug: dnsmasqtest
name: Dnsmasq
description: A simple DNS server
#url: https://github.com/home-assistant/addons/tree/master/dnsmasq
url: https://github.com/jnxxx/dnsmasqHA/tree/main
arch:
  - aarch64
  - amd64
#image: homeassistant/{arch}-addon-dnsmasq
image: jnxxx/{arch}-addon-dnsmasqtest
init: false
options:
  defaults:
    - 8.8.8.8
    - 8.8.4.4
  forwards: []
  hosts: []
  services: []
  cnames: []
  txts: []
  ptrs: []
  log_queries: false
  cache_size: 150
ports:
  53/tcp: 53
  53/udp: 53
schema:
  defaults:
    - str
  forwards:
    - domain: str
      server: str
  hosts:
    - host: str
      ip: str
  services:
    - host: str
      port: str
      priority: int
      srv: str
      weight: int
  cnames:
    - name: str
      target: str
  txts:
    - name: str
      value: str
  ptrs:
    - ip: str
      name: str
  log_queries: bool
  cache_size: int
startup: system
